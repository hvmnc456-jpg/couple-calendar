/* ─── constants ─── */
const TODAY=new Date(),DMS=86400000;
const TODAY_STR=d2s(TODAY);
const WD=['일','월','화','수','목','금','토'];

function d2s(d){
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dSince(d){return Math.floor((TODAY-d)/DMS)+1;}

function u8FromB64(b64){
  const pad='='.repeat((4-b64.length%4)%4);

function buildAnnList(cs,names,bdays){
  // cs = Date|null; bdays = {me:'YYYY-MM-DD'|'', partner:'YYYY-MM-DD'|''}
  const list=[];let id=1;
  if(cs){
    const sMo=cs.getMonth()+1,sDy=cs.getDate(),sYr=cs.getFullYear();
    list.push({id:id++,ti:'처음 만난 날 ❤️',mo:sMo,dy:sDy,yr:null,rc:true});
    const maxDt=new Date(TODAY.getTime()+3*366*DMS);
    // 100일 단위 기념일 (오늘 기준 +3년까지)
    for(let n=100;;n+=100){
      const md=new Date(cs.getTime()+(n-1)*DMS);
      if(md>maxDt) break;
      const em=n===100?'🎉':n%1000===0?'🎊':n%500===0?'🌟':'💕';
      list.push({id:id++,ti:`${n}일 기념 ${em}`,mo:md.getMonth()+1,dy:md.getDate(),yr:md.getFullYear(),rc:false});
    }
    // 주년 기념일 (오늘 기준 +3년까지)
    for(let y=sYr+1;;y++){
      const annDt=new Date(y,sMo-1,sDy);
      if(annDt>maxDt) break;
      const n=y-sYr,em=n===1?'🥂':n===2?'🎊':'✨';
      list.push({id:id++,ti:`${n}주년 ${em}`,mo:sMo,dy:sDy,yr:y,rc:false});
    }
  }
  if(bdays.me){const[,bm,bd]=bdays.me.split('-').map(Number);list.push({id:id++,ti:`${names.me} 생일 🎂`,mo:bm,dy:bd,yr:null,rc:true});}
  if(bdays.partner){const[,bm,bd]=bdays.partner.split('-').map(Number);list.push({id:id++,ti:`${names.partner} 생일 🎂`,mo:bm,dy:bd,yr:null,rc:true});}
  list.push({id:id++,ti:'크리스마스 🎄',mo:12,dy:25,yr:null,rc:true});
  return list;
}

function annDate(a){
  if(a.yr) return new Date(a.yr,a.mo-1,a.dy);
  const ty=new Date(TODAY.getFullYear(),a.mo-1,a.dy);
  return ty>=TODAY?ty:new Date(TODAY.getFullYear()+1,a.mo-1,a.dy);
}

/* ═══════════════════════════════════════
   CALENDAR TAB
══════════════════════════════════════ */
function CalTab({evs,addEv,delEv,updateEv,coupleStart,annList,names,U,holidays={},onFetchYear}){
  const [cm,setCm]=useState(new Date(TODAY.getFullYear(),TODAY.getMonth(),1));
  const [sel,setSel]=useState(TODAY_STR);
  const [showAdd,setAdd]=useState(false);
  const [det,setDet]=useState(null);
  const [edit,setEdit]=useState(null);
  const yr=cm.getFullYear(),mo=cm.getMonth();
  /* 셀 일정 정렬 우선순위: 함께(위) → 나 → 상대방(아래) */
  const EV_PRIO={both:0,me:1,partner:2};
  const sortEv=(a,b)=>((EV_PRIO[a.u]??1)-(EV_PRIO[b.u]??1))||(a.dt<b.dt?-1:a.dt>b.dt?1:0);
  const MAXPILL=3;
  useEffect(()=>{if(onFetchYear){onFetchYear(yr);if(mo===11)onFetchYear(yr+1);}},[cm]);
  const fdw=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const selEvs=evs.filter(e=>e.ed?sel>=e.dt&&sel<=e.ed:e.dt===sel).slice().sort(sortEv);

  const cells=[];
  for(let i=0;i<fdw;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  const procAnn=annList.map(a=>({...a,nd:annDate(a)})).filter(a=>a.nd>=TODAY).sort((a,b)=>a.nd-b.nd);
  const nextAnn=procAnn[0];
  const naDays=nextAnn?Math.ceil((nextAnn.nd-TODAY)/DMS):null;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:V.bg,position:'relative',overflow:'hidden'}}>

      {/* D-Day Banner */}
      <div style={{margin:'4px 14px 6px',borderRadius:22,background:V.ban,padding:'14px 18px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div>
          <div style={{fontSize:11,fontWeight:500,color:V.bT,opacity:.65,marginBottom:3,letterSpacing:.3}}>우리가 만난 지</div>
          <div style={{fontSize:28,fontWeight:700,color:V.bT,letterSpacing:-1,lineHeight:1}}>
            {dSince(coupleStart).toLocaleString()}<span style={{fontSize:16,fontWeight:600,marginLeft:4}}>일째 ❤️</span>
          </div>
          {nextAnn&&<div style={{fontSize:11,color:V.bT,opacity:.7,marginTop:5,display:'flex',alignItems:'center',gap:4}}>
            <span className="material-symbols-outlined" style={{fontSize:13,fontVariationSettings:"'FILL' 1"}}>event</span>
            {nextAnn.ti.replace(/[\u{1F300}-\u{1FFFF}❤️]/gu,'').trim()} · D-{naDays}
          </div>}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end',flexShrink:0}}>
          {['me','partner'].map(u=>(
            <div key={u} style={{display:'flex',gap:5,alignItems:'center'}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:U[u].color,boxShadow:'0 0 0 2px rgba(255,255,255,.5)'}}/>
              <span style={{fontSize:11,color:V.bT,fontWeight:600}}>{names[u]}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Month nav */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',flexShrink:0,marginBottom:2}}>
        <button onClick={()=>setCm(new Date(yr,mo-1,1))} style={{padding:6,color:V.oSV,display:'flex',alignItems:'center'}}>
          <span className="material-symbols-outlined" style={{fontSize:22}}>chevron_left</span>
        </button>
        <span style={{fontSize:15,fontWeight:600,color:V.oS,letterSpacing:-.3}}>{yr}년 {mo+1}월</span>
        <button onClick={()=>setCm(new Date(yr,mo+1,1))} style={{padding:6,color:V.oSV,display:'flex',alignItems:'center'}}>
          <span className="material-symbols-outlined" style={{fontSize:22}}>chevron_right</span>
        </button>
      </div>

      {/* Day-of-week headers */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 10px',flexShrink:0,marginBottom:2}}>
        {WD.map((d,i)=>(
          <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:600,letterSpacing:.2,color:i===0?'#FF453A':i===6?'#5E8EE0':V.oSV,padding:'2px 0'}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid — week rows with spanning bars */}
      <div style={{padding:'0 10px',flexShrink:0}}>
        {Array.from({length:Math.ceil(cells.length/7)},(_,w)=>{
          const wCells=cells.slice(w*7,(w+1)*7);
          const wDates=wCells.map(day=>
            day?`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`:null
          );
          const nonNull=wDates.filter(Boolean);
          if(!nonNull.length) return null;
          const wStart=nonNull[0],wEnd=nonNull[nonNull.length-1];

          /* 이 주에 걸치는 연일 일정 */
          const wBars=evs.filter(e=>e.ed&&e.ed!==e.dt&&e.dt<=wEnd&&e.ed>=wStart).slice().sort(sortEv);
          /* 이 주에서 단일 일정이 가장 많은 날 기준으로 높이 결정 */
          const wSingleCounts=wDates.map(d=>d?evs.filter(e=>(!e.ed||e.ed===e.dt)&&e.dt===d).length:0);
          const maxSingle=Math.min(MAXPILL,Math.max(0,...wSingleCounts));
          const cellH=44+wBars.length*13+Math.max(0,maxSingle-1)*13;

          return(
            <div key={w} style={{position:'relative',marginBottom:2}}>
              {/* 날짜 셀 */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
                {wCells.map((day,col)=>{
                  if(!day) return <div key={`e${w}${col}`} style={{minHeight:cellH}}/>;
                  const dateStr=wDates[col];
                  /* 단일 일정만 pill 표시 (연일 일정은 bar로 표시) */
                  const sDEvs=evs.filter(e=>(!e.ed||e.ed===e.dt)&&e.dt===dateStr).sort(sortEv);
                  const overflow=sDEvs.length>MAXPILL;
                  const shownEvs=sDEvs.slice(0,overflow?MAXPILL-1:MAXPILL);
                  const isSel=dateStr===sel,isTod=dateStr===TODAY_STR;
                  const isHol=!!(holidays&&holidays[dateStr]);
                  return(
                    <div key={dateStr} onClick={()=>setSel(dateStr)}
                      style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'3px 1px 4px',
                        cursor:'pointer',borderRadius:10,minHeight:cellH,
                        background:isSel?V.pri:isTod?V.pC:'transparent',transition:'background .15s'}}>
                      <span style={{fontSize:13,fontWeight:isSel?700:isTod?600:400,lineHeight:'20px',
                        color:isSel?'#fff':isTod?V.pri:(isHol||col===0)?'#FF453A':col===6?'#5E8EE0':V.oS}}>
                        {day}
                      </span>
                      {/* 연일 bar가 차지하는 높이만큼 단일 일정 pill을 아래로 밀어 겹침 방지 */}
                      {wBars.length>0&&<div style={{height:wBars.length*13,flexShrink:0}}/>}
                      {shownEvs.map(ev=>(
                        <div key={ev.id} style={{marginTop:2,fontSize:7.5,fontWeight:600,
                          width:'95%',boxSizing:'border-box',textAlign:'center',
                          background:isSel?'rgba(255,255,255,.22)':U[ev.u]?.light||'rgba(155,114,200,.12)',
                          color:isSel?'rgba(255,255,255,.9)':U[ev.u]?.color||'#9B72C8',
                          borderRadius:4,padding:'1px 4px',overflow:'hidden',
                          whiteSpace:'nowrap',textOverflow:'ellipsis',letterSpacing:.1}}>
                          {ev.ti.replace(/[\u{1F300}-\u{1FFFF}❤️\u{2700}-\u{27BF}]/gu,'').trim().slice(0,5)}
                        </div>
                      ))}
                      {overflow&&(
                        <div style={{marginTop:2,fontSize:7.5,fontWeight:600,
                          color:isSel?'rgba(255,255,255,.85)':V.oSV,letterSpacing:.1}}>
                          +{sDEvs.length-(MAXPILL-1)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* 연일 일정 spanning bar */}
              {wBars.map((ev,ri)=>{
                /* 이 주에서의 시작·끝 컬럼 계산 */
                const sc=wDates.findIndex(d=>d&&d>=ev.dt);
                const ec=wDates.reduce((a,d,i)=>d&&d<=ev.ed?i:a,-1);
                if(sc<0||ec<0) return null;
                const sh=ev.dt>=wStart; /* 이 주에서 시작 */
                const eh=ev.ed<=wEnd;   /* 이 주에서 종료 */
                const u=U[ev.u]||U.me;
                return(
                  <div key={ev.id} style={{
                    position:'absolute',top:26+ri*13,
                    left:`${sc*100/7}%`,width:`${(ec-sc+1)*100/7}%`,
                    padding:`0 ${eh?3:0}px 0 ${sh?4:0}px`,
                    pointerEvents:'none',
                  }}>
                    <div style={{
                      height:11,background:u.color,opacity:.88,
                      borderRadius:`${sh?6:0}px ${eh?6:0}px ${eh?6:0}px ${sh?6:0}px`,

                    }}>
                      {sh&&<span style={{fontSize:7.5,fontWeight:700,color:'#fff',whiteSpace:'nowrap',letterSpacing:.1,opacity:.95}}>

                      </span>}
                    </div>
                  </div>
                );
              })}
            </div>
          );

      {/* Events for selected date */}
      <div className="scr" style={{flex:1,padding:'10px 14px 88px',marginTop:6}}>
        <div style={{fontSize:11,fontWeight:700,color:V.oSV,marginBottom:8,letterSpacing:.8,textTransform:'uppercase'}}>
          {sel===TODAY_STR?'오늘':sel.replace(/-/g,'.')}

          </div>

            <span className="material-symbols-outlined" style={{fontSize:30,display:'block',marginBottom:6,opacity:.25}}>event_note</span>

          ))

        <button onClick={()=>setAdd(true)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',border:`1.5px dashed ${V.ol}`,borderRadius:12,padding:'10px 14px',color:V.oSV,fontSize:13,marginTop:6}}>
          <span className="material-symbols-outlined" style={{fontSize:18}}>add</span>일정 추가
        </button>

      {/* FAB */}

        <span className="material-symbols-outlined" style={{fontSize:26}}>add</span>
      </button>

      {showAdd&&<AddSht sel={sel} onClose={()=>setAdd(false)} onAdd={ev=>{addEv(ev);setAdd(false);}} names={names} U={U}/>}

        onDel={id=>{delEv(id);setDet(null);}}

function Toggle({on,onToggle}){

      <div style={{position:'absolute',top:3,left:on?23:3,width:20,height:20,borderRadius:'50%',background:'#fff',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.22)'}}/>
    </div>
  );
}

/* ── 인앱 날짜 피커 캘린더 ── */
function CalPicker({value,min,onSelect}){
  const init=value?new Date(value.replace(/-/g,'/')):new Date();
  const [cm,setCm]=useState(new Date(init.getFullYear(),init.getMonth(),1));
  const yr=cm.getFullYear(),mo=cm.getMonth();
  const fdw=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<fdw;i++) cells.push(null);
  for(let d=1;d<=dim;d++) cells.push(d);

  return(
    <div style={{background:V.surf,borderRadius:16,border:`1px solid ${V.ol}`,padding:'10px 6px 8px',marginTop:6,boxShadow:'0 4px 20px rgba(0,0,0,.08)'}}>
      {/* 월 이동 */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 4px',marginBottom:6}}>
        <button onClick={()=>setCm(new Date(yr,mo-1,1))} style={{padding:4,color:V.oSV,display:'flex',alignItems:'center'}}>
          <span className="material-symbols-outlined" style={{fontSize:20}}>chevron_left</span>
        </button>
        <span style={{fontSize:13,fontWeight:600,color:V.oS,letterSpacing:-.2}}>{yr}년 {mo+1}월</span>
        <button onClick={()=>setCm(new Date(yr,mo+1,1))} style={{padding:4,color:V.oSV,display:'flex',alignItems:'center'}}>
          <span className="material-symbols-outlined" style={{fontSize:20}}>chevron_right</span>
        </button>
      </div>
      {/* 요일 헤더 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:2}}>
        {WD.map((d,i)=>(
          <div key={d} style={{textAlign:'center',fontSize:10,fontWeight:600,color:i===0?'#FF453A':i===6?'#5E8EE0':V.oSV,padding:'1px 0'}}>{d}</div>
        ))}
      </div>
      {/* 날짜 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1px 0'}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const isSel=ds===value;
          const isTod=ds===TODAY_STR;
          const disabled=min&&ds<min;
          const dow=(fdw+day-1)%7;
          return(
            <div key={ds}
              onClick={()=>!disabled&&onSelect(ds)}
              style={{display:'flex',alignItems:'center',justifyContent:'center',height:32,borderRadius:8,cursor:disabled?'default':'pointer',background:isSel?V.pri:isTod?V.pC:'transparent',opacity:disabled?.3:1,transition:'background .12s'}}>
              <span style={{fontSize:12,fontWeight:isSel?700:isTod?600:400,color:isSel?'#fff':isTod?V.pri:dow===0?'#FF453A':dow===6?'#5E8EE0':V.oS}}>{day}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── 날짜 탭 버튼 ── */
function DateTab({label,value,active,onClick}){
  return(
    <button onClick={onClick} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'9px 6px',borderRadius:12,border:`1.5px solid ${active?V.pri:V.ol}`,background:active?V.pC:V.sC,cursor:'pointer',transition:'all .15s',userSelect:'none'}}>
      <span style={{fontSize:10,fontWeight:600,color:active?V.pri:V.oSV,letterSpacing:.4,textTransform:'uppercase'}}>{label}</span>
      <span style={{fontSize:13,fontWeight:600,color:active?V.pri:V.oS,letterSpacing:-.2}}>{value.replace(/-/g,'.')}</span>
    </button>
  );
}

function AddSht({sel,onClose,onAdd,names,U}){
  const [ti,setTi]=useState('');
  const [u,setU]=useState('me');
  const [sd,setSd]=useState(sel);
  const [ed,setEd]=useState(sel);
  const [picker,setPicker]=useState(null); // null | 'start' | 'end'
  const [aD,setAD]=useState(true);
  const [ts,setTs]=useState('12:00');
  const [te,setTe]=useState('');
  const [mm,setMm]=useState('');
  const [pl,setPl]=useState('');
  const [plAddr,setPlAddr]=useState('');
  const [plX,setPlX]=useState('');
  const [plY,setPlY]=useState('');

  const isRange=sd!==ed;

  function togglePicker(which){
    setPicker(p=>p===which?null:which);
  }

  function handlePickStart(v){
    setSd(v);
    if(v>ed) setEd(v);
    setPicker('end');
  }

  function handlePickEnd(v){
    setEd(v);
    setPicker(null);
  }

  function submit(){
    if(!ti.trim()) return;
    onAdd({
      ti:ti.trim(),
      dt:sd,
      ed:isRange?ed:null,
      u,
      aD:isRange?true:aD,
      s:isRange||aD?'':ts,
      e:isRange||aD?'':te,
      m:mm.trim(),
      pl:pl.trim(), plAddr, plX, plY,
    });
  }

  return(
    <div className="ovl" onClick={onClose}>
      <div className="sht" style={{background:V.surf,padding:'12px 20px 44px'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:38,height:4,borderRadius:2,background:'rgba(0,0,0,.1)',margin:'0 auto 18px'}}/>
        <div style={{fontSize:17,fontWeight:600,color:V.oS,marginBottom:16,letterSpacing:-.3}}>새 일정</div>

        <FRow icon="title">
          <input value={ti} onChange={e=>setTi(e.target.value)} placeholder="일정 제목" style={{fontSize:15,color:V.oS,fontWeight:500}} autoFocus/>
        </FRow>

        <FRow icon="person">
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {Object.entries(U).map(([id,info])=>(
              <button key={id} onClick={()=>setU(id)} style={{padding:'5px 13px',borderRadius:20,background:u===id?info.color:info.light,color:u===id?'#fff':info.color,fontSize:12,fontWeight:600,transition:'all .15s'}}>
                {id==='both'?'함께 🤝':(names?.[id]||info.name)}
              </button>
            ))}
          </div>
        </FRow>

        {/* 날짜 행 */}
        <FRow icon="calendar_today" top>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <DateTab label="시작일" value={sd} active={picker==='start'} onClick={()=>togglePicker('start')}/>
              <span style={{fontSize:16,color:V.oSV,flexShrink:0}}>~</span>
              <DateTab label="종료일" value={ed} active={picker==='end'} onClick={()=>togglePicker('end')}/>
            </div>
            {picker==='start'&&<CalPicker value={sd} onSelect={handlePickStart}/>}
            {picker==='end'&&<CalPicker value={ed} min={sd} onSelect={handlePickEnd}/>}
          </div>
        </FRow>

        {/* 시간 */}
        {!isRange&&!picker&&(
          <FRow icon="schedule">
            <span style={{flex:1,fontSize:14,color:V.oS}}>하루 종일</span>
            <Toggle on={aD} onToggle={()=>setAD(!aD)}/>
          </FRow>
        )}
        {!isRange&&!picker&&!aD&&(<>
          <FRow icon="">
            <span style={{fontSize:12,color:V.oSV,width:28,flexShrink:0}}>시작</span>
            <input type="time" value={ts} onChange={e=>setTs(e.target.value)} style={{fontSize:14,color:V.oS,flex:1}}/>
          </FRow>
          <FRow icon="">
            <span style={{fontSize:12,color:V.oSV,width:28,flexShrink:0}}>종료</span>
            <input type="time" value={te} onChange={e=>setTe(e.target.value)} style={{fontSize:14,color:V.oS,flex:1}}/>
          </FRow>
        </>)}

        {!picker&&(
          <FRow icon="place" top>
            <PlacePicker value={pl} address={plAddr} onPick={p=>{setPl(p.name);setPlAddr(p.address);setPlX(p.x);setPlY(p.y);}} placeholder="장소 검색 (선택)"/>
          </FRow>
        )}

        {!picker&&(
          <FRow icon="notes" top>
            <textarea value={mm} onChange={e=>setMm(e.target.value)} placeholder="메모 (선택사항)" rows={2} style={{fontSize:14,color:V.oS}}/>
          </FRow>
        )}

        <button onClick={submit} style={{width:'100%',padding:14,borderRadius:14,background:ti.trim()?V.pri:'rgba(0,0,0,.08)',color:ti.trim()?'#fff':V.oSV,fontSize:15,fontWeight:600,marginTop:18,transition:'background .2s,color .2s',letterSpacing:-.1}}>저장하기</button>
      </div>
    </div>
  );
}

function DetSht({ev,onClose,onDel,onEdit,names,U}){
  const [mapOpen,setMapOpen]=useState(false);
  const u=U[ev.u]||U.me;
  const dName=ev.u==='both'?'함께':ev.u==='me'?(names?.me||u.name):(names?.partner||u.name);
  const dateVal=ev.ed&&ev.ed!==ev.dt
    ?`${ev.dt.replace(/-/g,'.')} ~ ${ev.ed.replace(/-/g,'.')}`
    :ev.dt.replace(/-/g,'.');
  const rows=[
    {ic:'calendar_today',lb:'날짜',val:dateVal},
    ...(!ev.ed||ev.ed===ev.dt?[{ic:'schedule',lb:'시간',val:ev.aD?'하루 종일':`${ev.s}${ev.e?` – ${ev.e}`:''}`}]:[]),
    ...(ev.m?[{ic:'notes',lb:'메모',val:ev.m}]:[]),
  ];
  return(
    <div className="ovl" onClick={onClose}>
      <div className="sht" style={{background:V.surf,padding:'12px 20px 44px'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:38,height:4,borderRadius:2,background:'rgba(0,0,0,.1)',margin:'0 auto 18px'}}/>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:18}}>
          <div style={{width:44,height:44,borderRadius:12,background:u.light,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span className="material-symbols-outlined" style={{fontSize:22,color:u.color,fontVariationSettings:"'FILL' 1"}}>event</span>
          </div>
          <div>
            <div style={{fontSize:17,fontWeight:600,color:V.oS,letterSpacing:-.3}}>{ev.ti}</div>
            <div style={{fontSize:12,color:u.color,fontWeight:500,marginTop:1}}>{dName}의 일정</div>
          </div>
        </div>
        {rows.map(r=>(
          <div key={r.ic} style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:14}}>
            <span className="material-symbols-outlined" style={{fontSize:18,color:V.oSV,flexShrink:0,marginTop:1}}>{r.ic}</span>
            <div>
              <div style={{fontSize:11,color:V.oSV,marginBottom:1,letterSpacing:.3}}>{r.lb}</div>
              <div style={{fontSize:14,color:V.oS,fontWeight:400,lineHeight:1.4}}>{r.val}</div>
            </div>
          </div>
        ))}
        {ev.pl&&(
          <div style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:14}}>
            <span className="material-symbols-outlined" style={{fontSize:18,color:V.oSV,flexShrink:0,marginTop:1}}>place</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,color:V.oSV,marginBottom:1,letterSpacing:.3}}>장소</div>
              {ev.plX&&ev.plY
                ?<button onClick={()=>setMapOpen(true)} style={{fontSize:14,color:V.pri,fontWeight:600,display:'inline-flex',alignItems:'center',gap:3}}>{ev.pl}<span className="material-symbols-outlined" style={{fontSize:15}}>map</span></button>
                :<div style={{fontSize:14,color:V.oS,lineHeight:1.4}}>{ev.pl}</div>}
              {ev.plAddr&&<div style={{fontSize:12,color:V.tOff,marginTop:1}}>{ev.plAddr}</div>}
            </div>
          </div>
        )}
        {mapOpen&&<MapViewModal place={ev.pl} address={ev.plAddr} x={ev.plX} y={ev.plY} onClose={()=>setMapOpen(false)}/>}
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button onClick={()=>onDel(ev.id)} style={{flex:1,padding:13,borderRadius:14,background:'#FFF0F2',color:'#D1213A',fontSize:14,fontWeight:600}}>
            일정 삭제
          </button>
          <button onClick={()=>onEdit(ev)} style={{flex:1,padding:13,borderRadius:14,background:V.pC,color:V.pri,fontSize:14,fontWeight:600}}>
            일정 변경
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── 일정 변경 시트 ── */
function EditSht({ev,onClose,onSave,names,U}){
  const [ti,setTi]=useState(ev.ti);
  const [u,setU]=useState(ev.u);
  const [sd,setSd]=useState(ev.dt);
  const [ed,setEd]=useState(ev.ed||ev.dt);
  const [picker,setPicker]=useState(null);
  const [aD,setAD]=useState(ev.aD);
  const [ts,setTs]=useState(ev.s||'12:00');
  const [te,setTe]=useState(ev.e||'');
  const [mm,setMm]=useState(ev.m||'');
  const [pl,setPl]=useState(ev.pl||'');
  const [plAddr,setPlAddr]=useState(ev.plAddr||'');
  const [plX,setPlX]=useState(ev.plX||'');
  const [plY,setPlY]=useState(ev.plY||'');

  const isRange=sd!==ed;

  function togglePicker(which){setPicker(p=>p===which?null:which);}
  function handlePickStart(v){setSd(v);if(v>ed)setEd(v);setPicker('end');}
  function handlePickEnd(v){setEd(v);setPicker(null);}

  function submit(){
    if(!ti.trim()) return;
    onSave({
      ...ev,
      ti:ti.trim(),
      dt:sd,
      ed:isRange?ed:null,
      u,
      aD:isRange?true:aD,
      s:isRange||aD?'':ts,
      e:isRange||aD?'':te,
      m:mm.trim(),
      pl:pl.trim(), plAddr, plX, plY,
    });
  }

  return(
    <div className="ovl" onClick={onClose}>
      <div className="sht" style={{background:V.surf,padding:'12px 20px 44px'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:38,height:4,borderRadius:2,background:'rgba(0,0,0,.1)',margin:'0 auto 14px'}}/>

        {/* 헤더 */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div style={{fontSize:17,fontWeight:600,color:V.oS,letterSpacing:-.3}}>일정 변경</div>
          <button onClick={onClose} style={{padding:4,color:V.oSV,display:'flex',alignItems:'center'}}>
            <span className="material-symbols-outlined" style={{fontSize:22}}>close</span>
          </button>
        </div>

        {/* 제목 */}
        <FRow icon="title">
          <input value={ti} onChange={e=>setTi(e.target.value)} placeholder="일정 제목" style={{fontSize:15,color:V.oS,fontWeight:500}} autoFocus/>
        </FRow>

        {/* 담당 */}
        <FRow icon="person">
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            {Object.entries(U).map(([id,info])=>(
              <button key={id} onClick={()=>setU(id)} style={{padding:'5px 13px',borderRadius:20,background:u===id?info.color:info.light,color:u===id?'#fff':info.color,fontSize:12,fontWeight:600,transition:'all .15s'}}>
                {id==='both'?'함께 🤝':(names?.[id]||info.name)}
              </button>
            ))}
          </div>
        </FRow>

        {/* 날짜 */}
        <FRow icon="calendar_today" top>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <DateTab label="시작일" value={sd} active={picker==='start'} onClick={()=>togglePicker('start')}/>
              <span style={{fontSize:16,color:V.oSV,flexShrink:0}}>~</span>
              <DateTab label="종료일" value={ed} active={picker==='end'} onClick={()=>togglePicker('end')}/>
            </div>
            {picker==='start'&&<CalPicker value={sd} onSelect={handlePickStart}/>}
            {picker==='end'&&<CalPicker value={ed} min={sd} onSelect={handlePickEnd}/>}
          </div>
        </FRow>

        {/* 시간 */}
        {!isRange&&!picker&&(
          <FRow icon="schedule">
            <span style={{flex:1,fontSize:14,color:V.oS}}>하루 종일</span>
            <Toggle on={aD} onToggle={()=>setAD(!aD)}/>
          </FRow>
        )}
        {!isRange&&!picker&&!aD&&(<>
          <FRow icon="">
            <span style={{fontSize:12,color:V.oSV,width:28,flexShrink:0}}>시작</span>
            <input type="time" value={ts} onChange={e=>setTs(e.target.value)} style={{fontSize:14,color:V.oS,flex:1}}/>
          </FRow>
          <FRow icon="">
            <span style={{fontSize:12,color:V.oSV,width:28,flexShrink:0}}>종료</span>
            <input type="time" value={te} onChange={e=>setTe(e.target.value)} style={{fontSize:14,color:V.oS,flex:1}}/>
          </FRow>
        </>)}

        {/* 장소 */}

  const proc=annList.map(a=>{const nd=annDate(a);return{...a,nd,dl:Math.ceil((nd-TODAY)/DMS)};}).sort((a,b)=>a.dl-b.dl);

function BkAddSht({onClose,onAdd,defaultCat,allCats,addCustomCat}){

  const [newCat,setNewCat]=useState('');
  function submit(){
    if(!ti.trim()) return;
    onAdd({ti:ti.trim(),done:false,cat});
  }
  function submitNewCat(){
    const trimmed=newCat.trim();
    if(!trimmed||(allCats||[]).includes(trimmed)) return;
    addCustomCat(trimmed);
    setCat(trimmed);
    setNewCat('');
    setAddingCat(false);
  }
  return(
    <div className="ovl" onClick={onClose}>

/* ═══════════════════════════════════════
   DRUM-ROLL DATE PICKER (생일 설정용)
══════════════════════════════════════ */
function ScrollCol({items,selected,onSelect,label}){
  const IH=40;
  const ref=useRef(null);
  const skip=useRef(false);
  const timer=useRef(null);

  useEffect(()=>{
    if(!ref.current) return;
    let idx=items.indexOf(selected);
    if(idx<0) idx=Math.max(0,items.length-1);
    skip.current=true;
    ref.current.scrollTop=idx*IH;
    requestAnimationFrame(()=>{skip.current=false;});
  },[selected,items]);

  function onScroll(){
    if(skip.current) return;
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      if(!ref.current) return;
      const idx=Math.round(ref.current.scrollTop/IH);
      const c=Math.max(0,Math.min(idx,items.length-1));
      if(items[c]!==selected) onSelect(items[c]);
    },150);
  }

  return(
    <div style={{flex:1,position:'relative',overflow:'hidden',userSelect:'none'}}>
      {/* 선택 구분선 */}
      <div style={{position:'absolute',top:'50%',left:4,right:4,transform:'translateY(-50%)',height:IH,
        borderTop:`1px solid ${V.ol}`,borderBottom:`1px solid ${V.ol}`,pointerEvents:'none',zIndex:3}}/>
      {/* 위 페이드 */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:IH*2,
        background:'linear-gradient(to bottom,rgba(255,255,255,.97) 30%,rgba(255,255,255,0))',
        pointerEvents:'none',zIndex:2}}/>
      {/* 아래 페이드 */}
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:IH*2,
        background:'linear-gradient(to top,rgba(255,255,255,.97) 30%,rgba(255,255,255,0))',
        pointerEvents:'none',zIndex:2}}/>
      <div ref={ref} className="drum-col" onScroll={onScroll}
        style={{height:IH*5,overflowY:'scroll',scrollSnapType:'y mandatory',
          WebkitOverflowScrolling:'touch',paddingTop:IH*2,paddingBottom:IH*2,
          msOverflowStyle:'none',scrollbarWidth:'none'}}>
        {items.map(v=>(
          <div key={v} style={{height:IH,display:'flex',alignItems:'center',justifyContent:'center',
            scrollSnapAlign:'center',fontSize:16,letterSpacing:-.3,
            fontWeight:v===selected?700:400,color:v===selected?V.pri:V.oS,transition:'color .15s'}}>
            {label==='년'?v:String(v).padStart(2,'0')}{label}
          </div>
        ))}
      </div>
    </div>
  );
}

function DrumPicker({value,onSelect}){
  const curY=TODAY.getFullYear();
  const base=value?value.split('-').map(Number):[curY-25,1,1];
  const [y,setY]=useState(base[0]);
  const [m,setM]=useState(base[1]);
  const [d,setD]=useState(base[2]);

  const years=Array.from({length:curY-1939},(_,i)=>1940+i);
  const months=Array.from({length:12},(_,i)=>i+1);
  const dim=new Date(y,m,0).getDate();
  const days=Array.from({length:dim},(_,i)=>i+1);

  useEffect(()=>{
    const mx=new Date(y,m,0).getDate();
    if(d>mx) setD(mx);
  },[y,m]);

  function confirm(){
    const mx=new Date(y,m,0).getDate();
    const sd=Math.min(d,mx);
    onSelect(`${y}-${String(m).padStart(2,'0')}-${String(sd).padStart(2,'0')}`);
  }

  return(
    <div>
      <div style={{display:'flex',height:200,borderRadius:12,overflow:'hidden'}}>
        <ScrollCol items={years} selected={y} onSelect={setY} label="년"/>
        <ScrollCol items={months} selected={m} onSelect={setM} label="월"/>
        <ScrollCol items={days} selected={d} onSelect={setD} label="일"/>
      </div>
      <button onClick={confirm}
        style={{width:'100%',marginTop:12,padding:'13px',borderRadius:14,
          background:V.pri,color:'#fff',fontSize:15,fontWeight:600,letterSpacing:-.2}}>
        확인
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════
   CONNECT SECTION (더보기 탭 내부)
══════════════════════════════════════ */
function ConnectSection({coupleId,myUid,onSwitchCouple}){
  const [mode,setMode]=useState('menu'); // 'menu'|'create'|'join'
  const [joinCode,setJoinCode]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');

  async function joinPartner(){
    const code=joinCode.trim().toUpperCase();
    if(code.length<6){setErr('6자리 코드를 입력해주세요.');return;}
    if(code===coupleId){setErr('내 코드예요! 상대방 코드를 입력하세요.');return;}
    setBusy(true);setErr('');
    try{
      const ref=db.collection('couples').doc(code);
      const snap=await ref.get({source:'server'});
      if(!snap.exists){setErr('코드를 찾을 수 없어요.');setBusy(false);return;}
      const d=snap.data();
      if(d.uid2){setErr('이미 연결된 커플이에요.');setBusy(false);return;}
      if(d.uid1===myUid){setErr('내 코드예요! 상대방 코드를 입력하세요.');setBusy(false);return;}
      await ref.update({uid2:myUid,[`names.${myUid}`]:'상대방',[`birthdays.${myUid}`]:''});
      localStorage.setItem('coupleId',code);
      onSwitchCouple(code);
    }catch(e){
      if(e.code==='unavailable'){setErr('네트워크 연결을 확인해주세요.');}
      else{setErr('연결 실패. 다시 시도해주세요.');}
    }
    setBusy(false);
  }

  if(mode==='create'){
    return(
      <div style={{background:V.surf,borderRadius:16,border:`1px solid ${V.ol}`,padding:'18px 16px',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',marginBottom:14}}>
          <button onClick={()=>setMode('menu')} style={{marginRight:8,color:V.oSV,display:'flex',alignItems:'center'}}>
            <span className="material-symbols-outlined" style={{fontSize:20}}>arrow_back</span>
          </button>
          <span style={{fontSize:15,fontWeight:600,color:V.oS}}>내 초대 코드</span>
        </div>
        <div style={{background:V.pC,borderRadius:14,padding:'20px',textAlign:'center',border:`1.5px solid ${V.pri}`,marginBottom:14}}>
          <div style={{fontSize:11,color:V.bT,opacity:.65,marginBottom:8,letterSpacing:.3}}>아래 코드를 상대방에게 공유하세요</div>
          <div style={{fontSize:30,fontWeight:700,color:V.pri,letterSpacing:8,fontFamily:'monospace'}}>{coupleId}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center',color:V.oSV,fontSize:12}}>
          <span className="material-symbols-outlined" style={{fontSize:14,display:'inline-block',animation:'spin 1.5s linear infinite'}}>sync</span>
          상대방 연결 대기 중...
        </div>
      </div>
    );
  }

  if(mode==='join'){
    return(
      <div style={{background:V.surf,borderRadius:16,border:`1px solid ${V.ol}`,padding:'18px 16px',marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',marginBottom:14}}>
          <button onClick={()=>{setMode('menu');setErr('');setJoinCode('');}} style={{marginRight:8,color:V.oSV,display:'flex',alignItems:'center'}}>
            <span className="material-symbols-outlined" style={{fontSize:20}}>arrow_back</span>
          </button>
          <span style={{fontSize:15,fontWeight:600,color:V.oS}}>코드 입력</span>
        </div>
        <input
          value={joinCode}
          onChange={e=>setJoinCode(e.target.value.toUpperCase().slice(0,6))}
          placeholder="XXXXXX" autoFocus
          style={{width:'100%',textAlign:'center',fontSize:26,fontWeight:700,letterSpacing:6,
            padding:'14px',borderRadius:12,border:`2px solid ${joinCode.length===6?V.pri:V.ol}`,
            background:V.sC,color:V.oS,fontFamily:'monospace',outline:'none',caretColor:V.pri,
            marginBottom:10,transition:'border-color .2s'}}
        />
        {err&&<div style={{fontSize:12,color:'#D1213A',textAlign:'center',marginBottom:10}}>{err}</div>}
        <button onClick={joinPartner} disabled={busy||joinCode.length<6}
          style={{width:'100%',padding:13,borderRadius:12,
            background:joinCode.length===6?V.pri:'rgba(0,0,0,.08)',
            color:joinCode.length===6?'#fff':V.oSV,
            fontSize:14,fontWeight:600,opacity:busy?.6:1,transition:'all .2s'}}>
          {busy?'연결 중...':'커플 연결하기'}
        </button>
      </div>
    );
  }

  // mode === 'menu'
  return(
    <div style={{marginBottom:20}}>
      <SecLbl label="상대방과 연결하기"/>
      <div style={{background:V.surf,borderRadius:16,overflow:'hidden',border:`1px solid ${V.ol}`}}>
        <div onClick={()=>setMode('create')}
          style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderBottom:`1px solid ${V.ol}`,cursor:'pointer'}}>
          <div style={{width:36,height:36,borderRadius:10,background:V.pC,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span className="material-symbols-outlined" style={{fontSize:19,color:V.pri}}>share</span>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:500,color:V.oS}}>코드 생성</div>
            <div style={{fontSize:11,color:V.oSV,marginTop:1}}>초대 코드를 상대방에게 공유해요</div>
          </div>
          <span className="material-symbols-outlined" style={{fontSize:16,color:V.ol}}>chevron_right</span>
        </div>
        <div onClick={()=>setMode('join')}
          style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',cursor:'pointer'}}>
          <div style={{width:36,height:36,borderRadius:10,background:'rgba(75,143,224,.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span className="material-symbols-outlined" style={{fontSize:19,color:'#4B8FE0'}}>link</span>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:500,color:V.oS}}>코드 입력</div>
            <div style={{fontSize:11,color:V.oSV,marginTop:1}}>상대방의 초대 코드를 입력해요</div>
          </div>
          <span className="material-symbols-outlined" style={{fontSize:16,color:V.ol}}>chevron_right</span>
        </div>
      </div>
    </div>
  );
}

function ProfTab({names:initNames,setNames,coupleStart,setCoupleStart,birthdays:initBdays,setBirthdays,partnerUid,coupleId,myUid,onSwitchCouple,myGender,partnerGender,saveGender,onReset,calName,saveCalName}){
  const days=coupleStart?dSince(coupleStart):0;
  const lnRef=useRef(initNames);
  const [ln,setLn]=useState(initNames);
  const lbRef=useRef(initBdays);
  const [lb,setLb]=useState(initBdays);
  const calNameRef=useRef(calName);
  const [lcn,setLcn]=useState(calName);
  const calNameInputRef=useRef(null);

  const [editingName,setEditingName]=useState(null);
  const [editingCalName,setEditingCalName]=useState(false);
  const [activePicker,setActivePicker]=useState(null);
  const [showResetConfirm,setShowResetConfirm]=useState(false);
  const [notifSt,setNotifSt]=useState('checking'); // checking|unsupported|no-pwa|denied|default|loading|granted
  const [testSt,setTestSt]=useState('idle'); // idle|sending|ok|fail
  const meRef=useRef(null);
  const partnerRef=useRef(null);

  /* 알림 지원 여부 체크 */
  useEffect(()=>{
    const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
    const isPWA=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
    if(!('Notification' in window)||!('PushManager' in window)||!('serviceWorker' in navigator)){
      setNotifSt('unsupported'); return;
    }
    if(isIOS&&!isPWA){setNotifSt('no-pwa'); return;}
    setNotifSt(Notification.permission==='granted'?'granted':Notification.permission==='denied'?'denied':'default');
  },[]);

  /* calName prop이 외부(Firestore)에서 바뀔 때 동기화 */
  useEffect(()=>{
    if(!editingCalName){calNameRef.current=calName;setLcn(calName);}
  },[calName,editingCalName]);

  /* 알림 켜기 */
  async function enableNotif(){
    setNotifSt('loading');
    try{
      const perm=await Notification.requestPermission();
      if(perm!=='granted'){setNotifSt(perm==='denied'?'denied':'default'); return;}
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:u8FromB64(VAPID_PUBLIC_KEY)});
      await db.collection('couples').doc(coupleId).update({[`pushSubs.${myUid}`]:sub.toJSON()});
      setNotifSt('granted');
    }catch(e){console.warn('알림 등록 실패',e); setNotifSt('default');}
  }

  /* 알림 끄기 */
  async function disableNotif(){
    try{
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.getSubscription();
      if(sub) await sub.unsubscribe();
      await db.collection('couples').doc(coupleId).update({[`pushSubs.${myUid}`]:firebase.firestore.FieldValue.delete()});
      setNotifSt('default');
    }catch(e){}
  }

  /* 테스트 알림 — 내 기기로 직접 전송 */
  async function sendTestNotif(){
    setTestSt('sending');
    try{
      const reg=await navigator.serviceWorker.ready;
      const sub=await reg.pushManager.getSubscription();
      if(!sub) throw new Error('no sub');
      const r=await fetch('/api/push',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          subscription:sub.toJSON(),
          title:'테스트 알림 🔔',
          body:'알림이 정상적으로 작동하고 있어요!'
        })
      });
      setTestSt(r.ok?'ok':'fail');
    }catch(e){setTestSt('fail');}
    setTimeout(()=>setTestSt('idle'),3000);
  }

  function togglePicker(key){setActivePicker(p=>p===key?null:key);}
  function fmtDate(s){if(!s)return'미설정';const[y,m,d]=s.split('-');return`${y}.${m}.${d}`;}
  const csStr=coupleStart?d2s(coupleStart):'';

  return(
    <div style={{flex:1,position:'relative',overflow:'hidden',background:V.bg}}>
    <div className="scr" style={{height:'100%',overflowY:'auto',padding:'10px 14px 100px'}}>
      {/* Couple card */}
      <div style={{background:V.ban,borderRadius:24,padding:'22px 20px',textAlign:'center',marginBottom:20}}>
        {(()=>{
          const meC=myGender==='F'?U.partner.color:U.me.color;
          const ptC=partnerGender==='F'?U.partner.color:U.me.color;

            <div style={{display:'flex',justifyContent:'center',alignItems:'center',marginBottom:14}}>

              <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,.6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,marginLeft:-10,marginRight:-10,zIndex:3,boxShadow:'0 2px 8px rgba(0,0,0,.1)'}}>❤️</div>
              <div style={{width:64,height:64,borderRadius:'50%',background:ptC,display:'flex',alignItems:'center',justifyContent:'center',border:'3px solid rgba(255,255,255,.8)',fontSize:24,color:'#fff',fontWeight:700,boxShadow:'0 4px 12px rgba(0,0,0,.15)',zIndex:2}}>{(ln.partner||'?')[0]}</div>
            </div>

        <div style={{fontSize:17,fontWeight:600,color:V.bT,letterSpacing:-.3}}>{ln.me} &amp; {ln.partner}</div>

          {coupleStart

            :'사랑을 시작한 날을 설정해보세요 💕'
          }
        </div>
      </div>

      {/* 상대방과 연결하기 — 파트너 미연결 시만 표시 */}
      {!partnerUid&&<ConnectSection coupleId={coupleId} myUid={myUid} onSwitchCouple={onSwitchCouple}/>}

function travDays(sd,ed){
  // sd~ed 사이 날짜 문자열 배열
  const out=[];
  if(!sd) return out;
  const [sy,sm,sdd]=sd.split('-').map(Number);
  const end=ed||sd;
  const [ey,em,edd]=end.split('-').map(Number);
  let cur=new Date(sy,sm-1,sdd), last=new Date(ey,em-1,edd);
  while(cur<=last){
    const y=cur.getFullYear(),m=String(cur.getMonth()+1).padStart(2,'0'),d=String(cur.getDate()).padStart(2,'0');
    out.push(`${y}-${m}-${d}`);
    cur.setDate(cur.getDate()+1);
  }
  return out;
}
function fmtTrip(sd,ed){
  if(!sd) return '';
  const f=s=>{const[,m,d]=s.split('-');return `${+m}.${+d}`;};
  return ed&&ed!==sd?`${f(sd)} ~ ${f(ed)}`:f(sd);
}

/* ── 카카오맵 SDK 동적 로더 (장소 검색용) ── */
const KAKAO_APPKEY='87b5916ab21a6599f79222c5fb37d349';
let _kakaoP=null;
function loadKakao(){
  if(_kakaoP) return _kakaoP;
  _kakaoP=new Promise((res,rej)=>{
    if(window.kakao&&window.kakao.maps&&window.kakao.maps.services){return res();}
    if(window.kakao&&window.kakao.maps){return window.kakao.maps.load(()=>res());}
    const s=document.createElement('script');
    s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+KAKAO_APPKEY+'&libraries=services&autoload=false';
    s.onload=()=>{
      if(window.kakao&&window.kakao.maps&&window.kakao.maps.load) window.kakao.maps.load(()=>res());
      else { _kakaoP=null; rej(new Error('kakao sdk invalid')); }
    };
    s.onerror=()=>{ _kakaoP=null; rej(new Error('kakao sdk load fail')); }; // 실패 시 캐시 해제 → 재시도 가능
    document.head.appendChild(s);
  });
  return _kakaoP;
}

function PlaceSearchModal({initial,onClose,onSelect}){
  const [q,setQ]=useState(initial||'');
  const [results,setResults]=useState([]);
  const [msg,setMsg]=useState('장소명을 검색해보세요');
  const [sel,setSel]=useState(null);
  const psRef=useRef(null);
  const mapRef=useRef(null), mapObj=useRef(null), mk=useRef(null);
  function doSearch(){
    const kw=q.trim(); if(!kw){setMsg('검색어를 입력하세요');return;}
    setMsg('검색 중…');setResults([]);setSel(null);
    loadKakao().then(()=>{
      if(!psRef.current) psRef.current=new window.kakao.maps.services.Places();
      psRef.current.keywordSearch(kw,(data,status)=>{
        const S=window.kakao.maps.services.Status;
        if(status===S.OK){setResults(data);setMsg('');}
        else if(status===S.ZERO_RESULT){setResults([]);setMsg('검색 결과가 없어요');}
        else{setResults([]);setMsg('검색에 실패했어요 (키/도메인 확인)');}
      });
    }).catch(()=>{setResults([]);setMsg('지도를 불러오지 못했어요. 카카오 콘솔에서 "카카오맵" 제품 활성화 및 도메인 등록을 확인해주세요.');});
  }
  useEffect(()=>{
    if(!sel) return;
    loadKakao().then(()=>{
      const pos=new window.kakao.maps.LatLng(+sel.y,+sel.x);
      if(!mapObj.current){
        mapObj.current=new window.kakao.maps.Map(mapRef.current,{center:pos,level:3});
        mk.current=new window.kakao.maps.Marker({position:pos});mk.current.setMap(mapObj.current);
      }else{mk.current.setPosition(pos);}
      setTimeout(()=>{mapObj.current.relayout();mapObj.current.setCenter(pos);},80);
    });
  },[sel]);
  return(
    <div className="ovl" onClick={onClose}>
      <div className="sht" style={{background:V.surf,padding:'12px 18px 32px',maxHeight:'90%'}} onClick={e=>e.stopPropagation()}>
        <div style={{width:38,height:4,borderRadius:2,background:'rgba(0,0,0,.1)',margin:'0 auto 16px'}}/>
        <div style={{fontSize:17,fontWeight:600,color:V.oS,marginBottom:14,letterSpacing:-.3}}>장소 검색</div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();doSearch();}}} placeholder="장소·주소 검색 (예: 한라산)" autoFocus style={{flex:1,fontSize:15,color:V.oS,background:V.sC,borderRadius:10,padding:'11px 13px'}}/>
          <button onClick={doSearch} style={{flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',width:44,height:42,borderRadius:10,background:V.pri,color:'#fff'}}>
            <span className="material-symbols-outlined" style={{fontSize:20}}>search</span>
          </button>
        </div>

        {sel&&(
          <div style={{marginBottom:14}}>
            <div ref={mapRef} style={{width:'100%',height:190,borderRadius:12,overflow:'hidden',border:`1px solid ${V.ol}`,background:V.sC}}/>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginTop:10}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:14.5,fontWeight:700,color:V.oS,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sel.place_name}</div>
                <div style={{fontSize:12,color:V.oSV,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sel.road_address_name||sel.address_name}</div>
              </div>
              <button onClick={()=>onSelect({name:sel.place_name,address:sel.road_address_name||sel.address_name||'',x:sel.x,y:sel.y})} style={{flexShrink:0,padding:'10px 16px',borderRadius:12,background:V.pri,color:'#fff',fontSize:13.5,fontWeight:600}}>이 장소로 선택</button>
            </div>
          </div>
        )}

        <div style={{maxHeight:sel?180:300,overflowY:'auto'}}>
          {msg&&<div style={{padding:'14px 4px',fontSize:13,color:V.oSV}}>{msg}</div>}
          {results.map(p=>(
            <div key={p.id} onClick={()=>setSel(p)} style={{padding:'11px 6px',borderBottom:`1px solid ${V.ol}`,cursor:'pointer',background:sel&&sel.id===p.id?V.pC:'transparent',borderRadius:6}}>

              <div style={{fontSize:12,color:V.oSV,marginTop:2}}>{p.road_address_name||p.address_name}</div>
              {p.category_name&&<div style={{fontSize:11,color:V.tOff,marginTop:1}}>{p.category_name}</div>}

  );

function TravelTab({trips=[],onAddTrip,onDelTrip,onUpdatePlans}){
  const [openId,setOpenId]=useState(null);
  const [addTrip,setAddTrip]=useState(false);

  const trip=trips.find(t=>t.id===openId)||null;

  function createTrip(t){
    onAddTrip(t);
    setAddTrip(false);
    setOpenId(null); // 목록으로 돌아가 새 여행이 실시간으로 뜨면 탭
  }
  function delTrip(id){
    onDelTrip(id);
    setOpenId(null);
  }
  function addPlan(date,item){
    if(!trip) return;
    const list=trip.plans?.[date]||[];
    onUpdatePlans(trip.id,{...(trip.plans||{}),[date]:[...list,{...item,id:'pl'+Date.now()}]});
  }
  function delPlan(date,pid){
    if(!trip) return;
    onUpdatePlans(trip.id,{...(trip.plans||{}),[date]:(trip.plans?.[date]||[]).filter(x=>x.id!==pid)});
  }

  if(trip) return <TravelDetail trip={trip} onBack={()=>setOpenId(null)} onAddPlan={addPlan} onDelPlan={delPlan} onDelTrip={delTrip}/>;

  return(
    <div style={{flex:1,overflowY:'auto',background:V.bg}}>
      <div style={{padding:'18px 18px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:22,fontWeight:700,color:V.oS,letterSpacing:-.5}}>우리 여행 ✈️</div>
        <button onClick={()=>setAddTrip(true)} style={{display:'flex',alignItems:'center',gap:4,padding:'7px 13px',borderRadius:20,background:V.pri,color:'#fff',fontSize:13,fontWeight:600}}>
          <span className="material-symbols-outlined" style={{fontSize:17}}>add</span>여행 추가
        </button>
      </div>

      {trips.length===0?(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:'80px 20px'}}>
          <div style={{width:64,height:64,borderRadius:'50%',background:V.pC,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <span className="material-symbols-outlined" style={{fontSize:32,color:V.pri}}>luggage</span>
          </div>
          <div style={{fontSize:15,color:V.oSV,fontWeight:600}}>아직 등록된 여행이 없어요</div>
          <div style={{fontSize:13,color:V.tOff,textAlign:'center'}}>둘이 떠날 여행을 추가하고<br/>날짜별 계획표를 만들어보세요</div>
        </div>
      ):(
        <div style={{padding:'8px 16px 20px'}}>
          {trips.map(t=>{
            const days=travDays(t.sd,t.ed).length;

            return(
              <div key={t.id} onClick={()=>setOpenId(t.id)} style={{background:V.surf,borderRadius:16,padding:'15px 16px',marginBottom:11,border:`1px solid ${V.ol}`,boxShadow:'0 2px 8px rgba(0,0,0,.04)',cursor:'pointer'}}>

/* ═══════════════════════════════════════
   PAIRING SCREEN
══════════════════════════════════════ */
function PairingScreen({myUid,onPaired}){
  const [mode,setMode]=useState('home'); // 'home'|'create'|'join'
  const [myCode,setMyCode]=useState('');
  const [joinCode,setJoinCode]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);

  /* 상대방이 참여하면 자동 전환 */
  useEffect(()=>{
    if(mode!=='create'||!myCode) return;
    const unsub=db.collection('couples').doc(myCode).onSnapshot(snap=>{
      if(snap.exists&&snap.data().uid2) onPaired(myCode);
    });
    return()=>unsub();
  },[mode,myCode]);

  /* ── Step 3: 안전한 6자리 코드 생성 (0,1,I,O 제외로 혼동 방지) ── */
  function generateCode(){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    const arr=new Uint8Array(6);
    crypto.getRandomValues(arr);
    return Array.from(arr,b=>chars[b%chars.length]).join('');
  }

  /* ── Step 2+4: 코드 생성 + 서버 반영 확인 ── */
  async function createCouple(){
    setBusy(true);setErr('');
    try{
      const code=generateCode();
      const ref=db.collection('couples').doc(code);
      await ref.set({
        uid1:myUid, uid2:null,
        names:{[myUid]:'나'},
        birthdays:{[myUid]:''},
        coupleStart:d2s(TODAY),
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      });
      /* Step 4: 서버에 실제로 저장됐는지 확인 (캐시 우선 방지) */
      const verify=await ref.get({source:'server'});
      if(!verify.exists) throw new Error('서버 저장 실패');
      localStorage.setItem('coupleId',code);
      setMyCode(code);setMode('create');
    }catch(e){setErr('생성 실패. 네트워크를 확인 후 다시 시도해주세요.');}
    setBusy(false);
  }

  /* ── Step 2: 코드 입력 → 반드시 서버에서 조회 (캐시 우선 방지) ── */
  async function joinCouple(){
    const code=joinCode.trim().toUpperCase();
    if(code.length<6){setErr('6자리 코드를 입력해주세요.');return;}
    setBusy(true);setErr('');
    try{
      const ref=db.collection('couples').doc(code);
      const snap=await ref.get({source:'server'});
      if(!snap.exists){setErr('코드를 찾을 수 없어요. 코드를 다시 확인해주세요.');setBusy(false);return;}
      const d=snap.data();
      if(d.uid2){setErr('이미 연결된 커플이에요.');setBusy(false);return;}
      if(d.uid1===myUid){setErr('내 코드예요! 상대방 코드를 입력하세요.');setBusy(false);return;}
      await ref.update({uid2:myUid,[`names.${myUid}`]:'상대방',[`birthdays.${myUid}`]:''});
      localStorage.setItem('coupleId',code);
      onPaired(code);
    }catch(e){
      if(e.code==='unavailable'){setErr('네트워크 연결을 확인해주세요.');}
      else{setErr('연결 실패. 다시 시도해주세요.');}
    }
    setBusy(false);
  }

  if(mode==='create'){
    return(
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:V.bg,padding:'0 32px',gap:18}}>
        <div style={{fontSize:44}}>🎉</div>
        <div style={{fontSize:20,fontWeight:700,color:V.oS,letterSpacing:-.5,textAlign:'center'}}>초대 코드 생성 완료</div>
        <div style={{fontSize:13,color:V.oSV,textAlign:'center',lineHeight:1.7}}>아래 코드를 상대방에게 공유하세요.<br/>상대방이 입력하면 자동으로 연결돼요.</div>
        <div style={{background:V.pC,borderRadius:20,padding:'22px 36px',border:`2px solid ${V.pri}`,marginTop:4}}>
          <div style={{fontSize:34,fontWeight:700,color:V.pri,letterSpacing:10,textAlign:'center',fontFamily:'monospace'}}>{myCode}</div>
        </div>
        <div style={{fontSize:11,color:V.oSV,marginTop:4}}>상대방 연결 대기 중...</div>
        <button onClick={()=>onPaired(myCode)}
          style={{marginTop:6,padding:'13px 32px',borderRadius:14,background:V.surf,color:V.oSV,fontSize:13,border:`1px solid ${V.ol}`}}>
          연결 전에 먼저 시작하기
        </button>
      </div>
    );
  }

  if(mode==='join'){
    return(
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:V.bg,padding:'0 32px',gap:16,position:'relative'}}>
        <button onClick={()=>{setMode('home');setErr('');}} style={{position:'absolute',top:56,left:16,padding:8,color:V.oSV,display:'flex',alignItems:'center'}}>
          <span className="material-symbols-outlined" style={{fontSize:22}}>arrow_back</span>
        </button>
        <div style={{fontSize:40}}>🔗</div>
        <div style={{fontSize:20,fontWeight:700,color:V.oS,letterSpacing:-.5}}>코드 입력</div>
        <div style={{fontSize:13,color:V.oSV,textAlign:'center'}}>상대방의 초대 코드 6자리를 입력하세요</div>
        <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase().slice(0,6))}
          placeholder="ABC123" autoFocus
          style={{width:'100%',textAlign:'center',fontSize:30,fontWeight:700,letterSpacing:8,
            padding:'16px',borderRadius:14,border:`2px solid ${joinCode.length===6?V.pri:V.ol}`,
            background:V.surf,color:V.oS,fontFamily:'monospace',outline:'none',caretColor:V.pri,
            transition:'border-color .2s'}}/>
        {err&&<div style={{fontSize:12,color:'#D1213A',textAlign:'center'}}>{err}</div>}
        <button onClick={joinCouple} disabled={busy||joinCode.length<6}
          style={{width:'100%',padding:15,borderRadius:14,background:joinCode.length===6?V.pri:'rgba(0,0,0,.08)',
            color:joinCode.length===6?'#fff':V.oSV,fontSize:15,fontWeight:600,
            opacity:busy?.6:1,transition:'all .2s'}}>
          {busy?'연결 중...':'커플 연결하기'}
        </button>
      </div>
    );
  }

  return(
    <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:V.bg,padding:'0 32px',gap:18}}>
      <div style={{fontSize:56}}>💑</div>
      <div style={{fontSize:22,fontWeight:700,color:V.oS,letterSpacing:-.5,textAlign:'center'}}>우리 캘린더 시작</div>
      <div style={{fontSize:14,color:V.oSV,textAlign:'center',lineHeight:1.75}}>초대 코드로 상대방과 연결하면<br/>일정을 실시간으로 함께 공유해요</div>
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:12,marginTop:8}}>
        <button onClick={createCouple} disabled={busy}
          style={{width:'100%',padding:16,borderRadius:16,background:V.pri,color:'#fff',
            fontSize:15,fontWeight:600,boxShadow:'0 4px 16px rgba(212,96,122,.3)',opacity:busy?.6:1}}>
          {busy?'생성 중...':'초대 코드 만들기'}
        </button>
        <button onClick={()=>{setMode('join');setErr('');}}
          style={{width:'100%',padding:16,borderRadius:16,background:V.surf,color:V.pri,
            fontSize:15,fontWeight:600,border:`1.5px solid ${V.pri}`}}>
          코드 입력하기
        </button>
      </div>
      {err&&<div style={{fontSize:12,color:'#D1213A'}}>{err}</div>}
    </div>
  );
}

  const [coupleDoc,setCoupleDoc]=useState(null);
  const [evs,setEvs]=useState([]);
  const [bkItems,setBkItems]=useState([]);
  const [trips,setTrips]=useState([]);
  const [hasUpdate,setHasUpdate]=useState(false);
  const [holidays,setHolidays]=useState({});
  const fetchedYearsRef=useRef(new Set());

  /* ── SW 업데이트 감지 ── */
  useEffect(()=>{
    if(window.__swUpdateReady) setHasUpdate(true);
    const h=()=>setHasUpdate(true);
    window.addEventListener('sw-update',h);
    return()=>window.removeEventListener('sw-update',h);
  },[]);

  function handleRestart(){
    if(window.__swWaiting) window.__swWaiting.postMessage('SKIP_WAITING');
    else location.reload();
  }

  /* ── Auth ── */
  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async user=>{
      if(user){
        setMyUid(user.uid);
        const saved=localStorage.getItem('coupleId');
        if(saved){
          try{
            const snap=await db.collection('couples').doc(saved).get();
            if(snap.exists){
              const d=snap.data();
              if(d.uid1===user.uid||d.uid2===user.uid){
                setCoupleId(saved);setAppState('ready');return;
              }
            }
          }catch(e){}
          localStorage.removeItem('coupleId');
        }
        setAppState('pairing');
      }else{
        auth.signInAnonymously().catch(()=>setAppState('pairing'));
      }
    });
    return()=>unsub();
  },[]);

  /* ── Firestore 실시간 리스너 ── */
  useEffect(()=>{
    if(!coupleId) return;
    const c=db.collection('couples').doc(coupleId);
    const u1=c.onSnapshot(snap=>{if(snap.exists)setCoupleDoc(snap.data());});
    const u2=c.collection('events').onSnapshot(snap=>{
      setEvs(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    const u3=c.collection('buckets').orderBy('createdAt').onSnapshot(snap=>{
      setBkItems(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    const u4=c.collection('trips').orderBy('createdAt').onSnapshot(snap=>{
      setTrips(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return()=>{u1();u2();u3();u4();};
  },[coupleId]);

  /* ── Firestore doc 참조 헬퍼 ── */
  function cRef(){return db.collection('couples').doc(coupleId);}

  /* ── 파생 상태 ── */
  const partnerUid=coupleDoc
    ?(coupleDoc.uid1===myUid?coupleDoc.uid2:coupleDoc.uid1)
    :null;
  const names={
    me:      coupleDoc?.names?.[myUid]||'나',
    partner: partnerUid?coupleDoc?.names?.[partnerUid]||'상대방':'상대방',
  };
  const birthdays={
    me:      coupleDoc?.birthdays?.[myUid]||'',
    partner: partnerUid?coupleDoc?.birthdays?.[partnerUid]||'':'',
  };
  const coupleStart=coupleDoc?.coupleStart
    ?(()=>{const[y,m,d]=coupleDoc.coupleStart.split('-').map(Number);return new Date(y,m-1,d);})()
    :TODAY;

  /* uid ↔ role 변환 */
  function toRole(u){
    if(u==='both') return 'both';
    return u===myUid?'me':'partner';
  }
  const evsMapped=evs.map(ev=>({...ev,u:toRole(ev.u)}));
  const annList=buildAnnList(coupleStart,names,birthdays);

  /* ── 성별 ── */
  const myGender=coupleDoc?.genders?.[myUid]||null;
  const partnerGender=partnerUid?(coupleDoc?.genders?.[partnerUid]||null):null;
  function saveGender(g){return cRef().update({[`genders.${myUid}`]:g});}

  /* ── 법정공휴일 (nager.at, 1주일 캐시) ── */
  async function fetchHolidaysYear(year){
    if(fetchedYearsRef.current.has(year)) return;
    const key=`_hols_KR5_${year}`;
    let cached=null;
    try{cached=JSON.parse(localStorage.getItem(key)||'null');}catch(e){}
    if(cached&&Date.now()-cached.ts<7*24*60*60*1000){
      fetchedYearsRef.current.add(year);
      setHolidays(h=>({...h,...cached.data}));
      return;
    }
    fetchedYearsRef.current.add(year);
    try{
      const res=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
      if(!res.ok) return;
      const list=await res.json();
      /* 태양력 고정 공휴일 정규 날짜 (MM-DD → localName) */
      const SOLAR={
        '01-01':'새해','03-01':'3·1절','05-01':'노동절','05-05':'어린이날',
        '06-06':'현충일','08-15':'광복절','10-03':'개천절','10-09':'한글날','12-25':'크리스마스'
      };
      const data={};
      list.forEach(item=>{
        const d=new Date(item.date+'T00:00:00');
        const dow=d.getDay();
        const mmdd=String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        let isSub=item.localName==='대체공휴일';
        if(!isSub&&item.name) isSub=item.name.toLowerCase().includes('substitute');
        /* 태양력 대체공휴일: 월요일이고 정규 날짜가 아니며
           직전 일(d-1) 또는 토(d-2)가 해당 공휴일 정규 날짜인 경우
           → 원본 주말 날짜도 함께 holidays에 추가 */
        if(!isSub&&dow===1&&!SOLAR[mmdd]){
          for(let i=1;i<=2;i++){
            const prev=new Date(d.getTime()-i*86400000);
            const pm=String(prev.getMonth()+1).padStart(2,'0')+'-'+String(prev.getDate()).padStart(2,'0');
            if(SOLAR[pm]===item.localName){
              isSub=true;
              const origKey=`${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,'0')}-${String(prev.getDate()).padStart(2,'0')}`;
              if(!data[origKey]) data[origKey]=item.localName; // 원본 공휴일 날짜 추가
              break;
            }
          }
        }
        data[item.date]=isSub?'대체공휴일':item.localName;
      });
      localStorage.setItem(key,JSON.stringify({ts:Date.now(),data}));
      setHolidays(h=>({...h,...data}));
    }catch(e){}
  }
  useEffect(()=>{
    if(appState!=='ready') return;
    const yr=TODAY.getFullYear();
    fetchHolidaysYear(yr);
    fetchHolidaysYear(yr+1);
  },[appState]);

  /* ── 성별 기반 동적 색상 (남=파랑, 여=분홍, 미설정=기본값 유지) ── */
  const _gc=g=>g==='M'?'#4B8FE0':g==='F'?'#E86D8A':null;
  const _gl=g=>g==='M'?'rgba(75,143,224,.12)':g==='F'?'rgba(232,109,138,.12)':null;
  const dynU={
    me:{...U.me,...(_gc(myGender)&&{color:_gc(myGender),light:_gl(myGender)})},
    partner:{...U.partner,...(_gc(partnerGender)&&{color:_gc(partnerGender),light:_gl(partnerGender)})},
    both:U.both,
  };

  /* ── 캘린더 이름 ── */
  const calName=coupleDoc?.calendarName||'우리 캘린더 🌸';
  function saveCalName(name){
    const trimmed=(name||'').trim();
    return cRef().update({calendarName:trimmed||'우리 캘린더 🌸'});
  }

  /* ── 버킷 카테고리 ── */
  const customCats=coupleDoc?.customCats||[];
  const deletedCats=coupleDoc?.deletedCats||[];
  const allBucketCats=[...new Set([...BASE_CATS.filter(c=>!deletedCats.includes(c)),...customCats])];
  function addCustomCat(cat){
    if(!cat||allBucketCats.includes(cat)) return;
    return cRef().update({customCats:[...customCats,cat]});
  }
  function deleteCat(cat){
    if(BASE_CATS.includes(cat)){
      return cRef().update({deletedCats:[...deletedCats,cat]});
    }
    return cRef().update({customCats:customCats.filter(c=>c!==cat)});
  }

  /* ── 파트너에게 푸시 알림 전송 ── */
  async function sendPush(title,body){
    if(!partnerUid) return;
    const sub=coupleDoc?.pushSubs?.[partnerUid];
    if(!sub?.endpoint) return;
    try{
      const r=await fetch('/api/push',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({subscription:sub,title,body})
      });
      // 410 = 구독 만료 → Firestore에서 제거
      if(r.status===410){
        cRef().update({[`pushSubs.${partnerUid}`]:firebase.firestore.FieldValue.delete()}).catch(()=>{});
      }
    }catch(e){}
  }

  /* ── 이벤트 쓰기 ── */
  function addEv(ev){
    const uid=ev.u==='both'?'both':ev.u==='me'?myUid:(partnerUid||myUid);
    sendPush('새 일정이 추가됐어요 📅',`${names.me}: ${ev.ti}`).catch(()=>{});
    return cRef().collection('events').add({
      ...ev,u:uid,createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  function delEv(id){return cRef().collection('events').doc(id).delete();}
  function updateEv(ev){
    const{id,...data}=ev;
    const uid=data.u==='both'?'both':data.u==='me'?myUid:(partnerUid||myUid);
    return cRef().collection('events').doc(id).set({...data,u:uid});
  }

  /* ── 버킷리스트 쓰기 ── */
  function addBkItem(item){
    sendPush('버킷리스트가 추가됐어요 ✨',`${names.me}: ${item.ti}`).catch(()=>{});
    return cRef().collection('buckets').add({
      ...item,createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  function toggleBkItem(id){
    const item=bkItems.find(i=>i.id===id);
    if(!item) return;
    return cRef().collection('buckets').doc(id).update({done:!item.done});
  }
  function delBkItem(id){
    return cRef().collection('buckets').doc(id).delete();
  }

  /* ── 여행 쓰기 (커플 공유) ── */
  function addTrip(t){
    sendPush('새 여행이 추가됐어요 ✈️',`${names.me}: ${t.ti}`).catch(()=>{});
    return cRef().collection('trips').add({
      ...t,plans:{},createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  function delTrip(id){
    return cRef().collection('trips').doc(id).delete();
  }
  function updateTripPlans(id,plans){
    return cRef().collection('trips').doc(id).update({plans});
  }

  /* ── 설정 저장 ── */
  function saveNames(n){
    const upd={[`names.${myUid}`]:n.me};
    if(partnerUid) upd[`names.${partnerUid}`]=n.partner;
    return cRef().update(upd);
  }
  function saveCoupleStart(dt){return cRef().update({coupleStart:d2s(dt)});}
  function saveBirthdays(b){
    const upd={[`birthdays.${myUid}`]:b.me};
    if(partnerUid) upd[`birthdays.${partnerUid}`]=b.partner;
    return cRef().update(upd);
  }

  function handlePaired(id){setCoupleId(id);setAppState('ready');}

  /* ── 초기화: Firestore 삭제 → localStorage 제거 → 로그아웃 → 리로드 ── */
  async function handleReset(){
    try{ await cRef().delete(); }catch(e){}
    localStorage.removeItem('coupleId');
    try{ await auth.signOut(); }catch(e){}
    location.reload();
  }

  if(appState==='loading') return <LoadingScreen/>;
  if(appState==='pairing') return <PairingScreen myUid={myUid} onPaired={handlePaired}/>;

  return(
    <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,height:'var(--app-h)',display:'flex',flexDirection:'column',background:V.bg,fontFamily:"'Roboto',sans-serif"}}>
      {hasUpdate&&<UpdateBanner onRestart={handleRestart}/>}
      <SBar/>
      <AHdr names={names} U={dynU} calName={calName}/>
      <div style={{flex:1,overflow:'hidden',position:'relative',display:'flex',flexDirection:'column'}}>
        {tab==='calendar'    &&<CalTab evs={evsMapped} addEv={addEv} delEv={delEv} updateEv={updateEv} coupleStart={coupleStart} annList={annList} names={names} U={dynU} holidays={holidays} onFetchYear={fetchHolidaysYear}/>}
        {tab==='anniversary' &&<AnnTab coupleStart={coupleStart} annList={annList} names={names}/>}
        {tab==='bucket'      &&<BkTab items={bkItems} onToggle={toggleBkItem} onAdd={addBkItem} onDel={delBkItem} allCats={allBucketCats} addCustomCat={addCustomCat} customCats={customCats} delCustomCat={deleteCat}/>}
        {tab==='travel'      &&<TravelTab trips={trips} onAddTrip={addTrip} onDelTrip={delTrip} onUpdatePlans={updateTripPlans}/>}
        {tab==='profile'     &&<ProfTab names={names} setNames={saveNames} coupleStart={coupleStart} setCoupleStart={saveCoupleStart} birthdays={birthdays} setBirthdays={saveBirthdays} partnerUid={partnerUid} coupleId={coupleId} myUid={myUid} onSwitchCouple={id=>setCoupleId(id)} myGender={myGender} partnerGender={partnerGender} saveGender={saveGender} onReset={handleReset} calName={calName} saveCalName={saveCalName}/>}
      </div>
      <div style={{height:'60px',flexShrink:0}}/>
      <BTBar active={tab} setActive={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-mount')).render(<App/>);
</script>

<script>
/* ── version.json 기반 업데이트 감지 (배포마다 정확히 동작) ── */
(function(){
  function notifyUpdate(){
    window.__swUpdateReady=true;
    window.dispatchEvent(new CustomEvent('sw-update'));
  }
  function checkVersion(){
    fetch('/version.json?t='+Date.now(),{cache:'no-store'})
      .then(function(r){return r.json();})
      .then(function(data){
        var stored=localStorage.getItem('_appVer');
        if(!stored){localStorage.setItem('_appVer',String(data.v));return;}
        if(String(stored)!==String(data.v)){
          localStorage.setItem('_appVer',String(data.v));
          notifyUpdate();
        }
      }).catch(function(){});
  }
  checkVersion();
  setInterval(checkVersion,5*60*1000);
})();

/* ── 서비스 워커 등록 (오프라인 지원) ── */
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(!refreshing){refreshing=true;location.reload();}
  });
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').then(function(reg){
      function offerReload(worker){
        window.__swWaiting=worker;
        window.__swUpdateReady=true;
        window.dispatchEvent(new CustomEvent('sw-update'));
      }
      if(reg.waiting) offerReload(reg.waiting);
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller) offerReload(nw);
        });
      });
    });
  });
}
</script>
</body>
</html>
